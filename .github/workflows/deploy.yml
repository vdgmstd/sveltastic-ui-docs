name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout docs (this repo)
        uses: actions/checkout@v5
        with:
          path: docs

      # docs imports from `sveltastic-ui` via Vite alias to `../ui/src/...`,
      # including internal *.api.json files used to render the API tables.
      # Those JSONs aren't part of the published npm tarball, so we check
      # out the kit repo as a sibling — same layout as the hybrid dev workspace.
      - name: Checkout ui kit as sibling
        uses: actions/checkout@v5
        with:
          repository: vdgmstd/sveltastic-ui
          ref: master
          path: ui

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            docs/package-lock.json
            ui/package-lock.json

      # tokens.css inside ui/ does `@import 'tailwindcss'`, and @tailwindcss/vite
      # resolves the package walking UP from the file's path, not from docs/.
      # So tailwindcss has to be installed inside ui/ too.
      - name: Install ui dependencies
        run: npm ci
        working-directory: ui

      - name: Install docs dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          BASE_PATH: /sveltastic-ui-docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
